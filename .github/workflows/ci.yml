name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Workaround for npm/cli#4828: rollup ships platform-specific native
      # binaries as optional deps that npm doesn't re-resolve when the
      # lockfile was generated on a different OS. Rebuild from package.json
      # so the runner picks up @rollup/rollup-linux-x64-gnu.
      - run: rm -f package-lock.json && npm install --no-audit
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run audit-dist
      - run: npm run compare
      - run: npm run build-visual
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: parity-reports
          path: reports/
