name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run audit-dist
      - run: npm run compare
      - run: npm run build-visual
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: parity-reports
          path: reports/
