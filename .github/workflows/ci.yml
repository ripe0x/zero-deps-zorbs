name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Use `npm install` rather than `npm ci`: rollup's platform-specific
      # native binaries are tracked as optional deps that npm's ci command
      # sometimes fails to install on a different platform than the lockfile
      # was generated on (https://github.com/npm/cli/issues/4828).
      - run: npm install --no-audit --prefer-offline
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run audit-dist
      - run: npm run compare
      - run: npm run build-visual
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: parity-reports
          path: reports/
